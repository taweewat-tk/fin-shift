services:
  postgres:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: finshift
      POSTGRES_PASSWORD: finshift
      POSTGRES_DB: creditcard
    ports:
      - '5432:5432'
    volumes:
      - fin-shift-postgres-data:/var/lib/postgresql/data
      - ./docker/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U finshift -d creditcard']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fin-shift-postgres-data:
